name: Package Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download dependencies
        shell: cmd
        run: |
          scripts\windows\download-javafx-windows.bat
          scripts\windows\download-sqlite-jdbc.bat

      - name: Build Windows installer
        shell: cmd
        run: scripts\windows\package-exe.bat

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: medicare-clinic-windows-installer
          path: dist/windows/*.exe

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/windows/*.exe
