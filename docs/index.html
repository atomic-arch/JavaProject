<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MediCare Clinic Download</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #1f2933;
      background: #f6f8fb;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 72px 24px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 42px;
      line-height: 1.1;
    }

    p {
      font-size: 18px;
      line-height: 1.55;
      color: #4b5563;
    }

    a.button {
      display: inline-block;
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: 6px;
      color: white;
      background: #1769aa;
      text-decoration: none;
      font-weight: 700;
    }

    .note {
      margin-top: 28px;
      font-size: 14px;
      color: #667085;
    }
  </style>
</head>
<body>
  <main>
    <h1>MediCare Clinic</h1>
    <p>
      Download the latest Windows installer for the JavaFX clinic management app.
      No repository clone is required.
    </p>
    <a class="button" href="https://github.com/atomic-arch/JavaProject/releases/latest">
      Download for Windows
    </a>
    <p class="note">
      Windows may show a SmartScreen warning because this student project is not code-signed.
    </p>
  </main>
</body>
</html>
